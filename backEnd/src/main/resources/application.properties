# -----------------------------------------------
# OpenWeatherMap
# -----------------------------------------------
clima.openweathermap.api-key=${OPENWEATHER_API_KEY:}
clima.openweathermap.base-url=${OPENWEATHER_BASE_URL:https://api.openweathermap.org/data/2.5}
clima.openweathermap.lat=${OPENWEATHER_LAT:-32.9442}
clima.openweathermap.lon=${OPENWEATHER_LON:-60.6505}
clima.openweathermap.timeout-ms=${OPENWEATHER_TIMEOUT_MS:3000}

# -----------------------------------------------
# Mercado Pago
# -----------------------------------------------
mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN:}
mercadopago.webhook-secret=${MERCADOPAGO_WEBHOOK_SECRET:}
mercadopago.success-url=${MERCADOPAGO_SUCCESS_URL:http://localhost:5173/pagos/success}
mercadopago.failure-url=${MERCADOPAGO_FAILURE_URL:http://localhost:5173/pagos/failure}
mercadopago.pending-url=${MERCADOPAGO_PENDING_URL:http://localhost:5173/pagos/pending}
mercadopago.notification-url=${MERCADOPAGO_NOTIFICATION_URL:http://localhost:8081/api/pagos/webhook}

