# H2 in-memory database for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

server.port=8081

# JWT
jwt.secret=test-secret-key-for-unit-tests-minimum-length
jwt.expiration-ms=86400000

# MercadoPago (test mode)
mercadopago.access-token=TEST-ACCESS-TOKEN
mercadopago.success-url=http://localhost/success
mercadopago.failure-url=http://localhost/failure
mercadopago.pending-url=http://localhost/pending
mercadopago.notification-url=http://localhost/webhook
mercadopago.webhook-secret=test-webhook-secret

# Clima
clima.openweathermap.api-key=test-api-key
clima.openweathermap.base-url=http://localhost
clima.openweathermap.lat=-32.9442
clima.openweathermap.lon=-60.6505
clima.openweathermap.timeout-ms=1000

# Reserva
reserva.pago.timeout-minutos=30

# Disable DataSeeder in tests
spring.profiles.active=test
